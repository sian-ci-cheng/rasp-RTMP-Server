# ============================================================
# nginx RTMP 伺服器設定
# 適用於樹莓派4 + nginx-rtmp-module
# ============================================================

# 載入 RTMP 模組（Debian/Ubuntu/Raspberry Pi OS 必須）
load_module modules/ngx_rtmp_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# ============================================================
# RTMP 伺服器設定
# ============================================================
rtmp {
    server {
        # 監聽 RTMP 標準埠
        listen 1935;

        # 最大 chunk 大小（越大越穩定，但延遲稍高）
        chunk_size 4096;

        # 最大連線數
        max_connections 16;

        # --------------------------------------------------------
        # live 應用程式：接收推流並分發
        # --------------------------------------------------------
        application live {
            live on;

            # 允許任何來源推流（可限制為特定 IP）
            allow publish all;
            allow play all;

            # 關閉錄製（若需要錄製請改為 all 或 local）
            record off;

            # 推流中斷時自動清除
            drop_idle_publisher 10s;

            # HLS 輸出（HTTP 直播串流）
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3s;
            hls_playlist_length 30s;

            # DASH 輸出（選用）
            # dash on;
            # dash_path /tmp/dash;
            # dash_fragment 3s;

            # 推流通知（可選）
            # on_publish http://localhost:8080/auth;
            # on_done http://localhost:8080/done;

            # 多路轉推設定
            # 取消注釋以啟用轉推至其他伺服器
            # push rtmp://a.rtmp.youtube.com/live2/YOUR-STREAM-KEY;
            # push rtmp://live.twitch.tv/app/YOUR-STREAM-KEY;
        }

        # --------------------------------------------------------
        # relay 應用程式：從網路接收並中繼推流
        # --------------------------------------------------------
        application relay {
            live on;
            allow publish 127.0.0.1;  # 只允許本機推流
            allow play all;

            record off;
        }

        # --------------------------------------------------------
        # record 應用程式：接收推流並錄製
        # --------------------------------------------------------
        application record {
            live on;
            allow publish 127.0.0.1;
            allow play all;

            record all;
            record_path /var/recordings;
            record_suffix -%Y%m%d-%H%M%S.flv;
            record_max_size 1024M;
            record_unique on;
        }
    }
}

# ============================================================
# HTTP 伺服器設定（統計頁面 + HLS 服務）
# ============================================================
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # 日誌格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    server {
        listen 8080;
        server_name localhost;

        # --------------------------------------------------------
        # RTMP 統計頁面
        # --------------------------------------------------------
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /stat.xsl;
            add_header Refresh "3; $request_uri";
        }

        location /stat.xsl {
            alias /usr/share/doc/libnginx-mod-rtmp/stat.xsl;
        }

        # --------------------------------------------------------
        # HLS 串流服務
        # --------------------------------------------------------
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # --------------------------------------------------------
        # DASH 串流服務（選用）
        # --------------------------------------------------------
        # location /dash {
        #     types {
        #         application/dash+xml mpd;
        #         video/mp4 mp4;
        #     }
        #     alias /tmp/dash;
        #     add_header Cache-Control no-cache;
        #     add_header Access-Control-Allow-Origin *;
        # }

        # --------------------------------------------------------
        # 健康檢查端點
        # --------------------------------------------------------
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # --------------------------------------------------------
        # 控制端點（控制串流）
        # --------------------------------------------------------
        location /control {
            rtmp_control all;
        }
    }
}
